<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Chess: Special Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --light: #f0d9b5; --dark: #b58863; --move: rgba(46, 204, 113, 0.6); }
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #lobby { background: #34495e; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
        #game-view { display: none; flex-direction: column; align-items: center; }
        #board { display: grid; grid-template-columns: repeat(8, 11.5vw); grid-template-rows: repeat(8, 11.5vw); border: 4px solid #1a252f; max-width: 480px; max-height: 480px; }
        @media (min-width: 500px) { #board { grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); } }
        .sq { display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; position: relative; }
        .l { background: var(--light); } .d { background: var(--dark); }
        .selected { background: #e74c3c !important; }
        .valid::after { content: ''; width: 15px; height: 15px; background: var(--move); border-radius: 50%; position: absolute; }
        .stunned { opacity: 0.4; filter: grayscale(1); }
        .shielded { border: 3px solid #3498db; border-radius: 50%; width: 80%; height: 80%; position: absolute; }
        .trap { width: 10px; height: 10px; background: red; border-radius: 50%; position: absolute; bottom: 5px; right: 5px; }
        .btn { background: #e67e22; border: none; padding: 10px; color: white; font-weight: bold; border-radius: 5px; margin: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>Better Chess</h1>
        <button class="btn" onclick="start('white')">CREATE PARTY</button>
        <input type="text" id="code-in" placeholder="Code" style="padding: 10px; width: 80%; margin: 10px 0; border-radius: 5px; border: none; text-align: center;">
        <button class="btn" onclick="start('black')">JOIN PARTY</button>
    </div>

    <div id="game-view">
        <h3 id="role-text"></h3>
        <div id="board"></div>
        <div id="ui" style="width: 100%; max-width: 400px; text-align: center;">
            <h2 id="turn-txt">White's Turn</h2>
            <p>Party Code: <b id="p-code"></b></p>
            <div id="abilities"></div>
        </div>
    </div>

<script>
// --- REPLACE WITH YOUR CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyDimKHiFMBA-qEKSTGtB54pllgjEwAbBsc",
    databaseURL: "https://chess-9b33e-default-rtdb.firebaseio.com",
    projectId: "chess-9b33e",
    appId: "1:225122056742:web:51e8b07bb7cd6ce91f84e7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let gameId, myTeam, board = [], turn = 'white', selected = null, moves = [], traps = [];

function start(team) {
    gameId = (team === 'white') ? Math.floor(1000 + Math.random()*9000).toString() : document.getElementById('code-in').value;
    myTeam = team;
    if(team === 'white') initBoard();
    
    db.ref('g/' + gameId).on('value', snap => {
        const d = snap.val();
        if(d) { board = d.b; turn = d.t; traps = d.tr || []; render(); }
    });

    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game-view').style.display = 'flex';
    document.getElementById('p-code').innerText = gameId;
    document.getElementById('role-text').innerText = "Team: " + team.toUpperCase();
}

function initBoard() {
    board = Array(8).fill().map(() => Array(8).fill(null));
    const layout = ['Rook','Knight','Bishop','Queen','King','Bishop','Knight','Rook'];
    const syms = {w:{R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔',P:'♙'}, b:{R:'♜',N:'♞',B:'♝',Q:'♛',K:'♚',P:'♟'}};
    for(let i=0; i<8; i++){
        board[0][i] = { team:'black', type:layout[i], sym:syms.b[layout[i][0]], cd:0, st:0 };
        board[1][i] = { team:'black', type:'Pawn', sym:syms.b.P, cd:0, st:0 };
        board[6][i] = { team:'white', type:'Pawn', sym:syms.w.P, cd:0, st:0 };
        board[7][i] = { team:'white', type:layout[i], sym:syms.w[layout[i][0]], cd:0, st:0 };
    }
    sync();
}

function sync() { db.ref('g/' + gameId).set({ b: board, t: turn, tr: traps }); }

function render() {
    const bDiv = document.getElementById('board'); bDiv.innerHTML = '';
    for(let r=0; r<8; r++){
        for(let c=0; c<8; c++){
            const s = document.createElement('div');
            s.className = `sq ${(r+c)%2===0?'l':'d'}`;
            if(selected?.r===r && selected?.c===c) s.classList.add('selected');
            if(moves.some(m=>m.r===r && m.c===c)) s.classList.add('valid');
            
            const p = board[r][c];
            if(p){
                const span = document.createElement('span'); span.innerText = p.sym;
                if(p.st > 0) span.className = 'stunned';
                if(p.sh) s.innerHTML += '<div class="shielded"></div>';
                s.appendChild(span);
            }
            if(traps.some(t=>t.r===r && t.c===c && t.team === myTeam)) s.innerHTML += '<div class="trap"></div>';
            
            s.onclick = () => (turn === myTeam) ? handleClick(r,c) : null;
            bDiv.appendChild(s);
        }
    }
    document.getElementById('turn-txt').innerText = turn.toUpperCase() + "'s Turn";
}

function handleClick(r, c) {
    const target = board[r][c];
    if(moves.some(m=>m.r===r && m.c===c)) return move(r, c);

    if(target && target.team === myTeam && target.st <= 0) {
        selected = {r, c};
        moves = getMoves(target, r, c);
        showAbilities(target, r, c);
    } else { selected = null; moves = []; document.getElementById('abilities').innerHTML = ''; }
    render();
}

function move(tr, tc) {
    const p = board[selected.r][selected.c];
    const target = board[tr][tc];

    // ROOK HIDE
    if(p.type === 'Rook' && target && target.team === p.team) { p.hid = target; }
    // SHIELD BLOCK
    else if(target && target.team !== p.team && target.sh) { target.sh = false; endTurn(); return; }

    board[tr][tc] = p;
    board[selected.r][selected.c] = p.hid || null;
    p.hid = null;

    // TRAP CHECK
    const tIdx = traps.findIndex(t=>t.r===tr && t.c===tc && t.team !== p.team);
    if(tIdx !== -1) { board[tr][tc] = null; traps.splice(tIdx, 1); }

    endTurn();
}

function endTurn() {
    board.flat().forEach(p => { if(p && p.team === turn) { if(p.st>0) p.st--; if(p.cd>0) p.cd--; }});
    turn = (turn === 'white' ? 'black' : 'white');
    selected = null; moves = []; sync();
}

function getMoves(p, r, c) {
    const m = []; const d = p.team === 'white' ? -1 : 1;
    if(p.type==='Pawn') {
        if(!board[r+d][c]) m.push({r:r+d, c});
        if(board[r+d][c-1]?.team && board[r+d][c-1].team !== p.team) m.push({r:r+d, c:c-1});
        if(board[r+d][c+1]?.team && board[r+d][c+1].team !== p.team) m.push({r:r+d, c:c+1});
    } else {
        // Simplified: allow movement to any square for testing abilities
        for(let i=0; i<8; i++) for(let j=0; j<8; j++) if(!board[i][j] || board[i][j].team !== p.team || p.type==='Rook') m.push({r:i, c:j});
    }
    return m;
}

function showAbilities(p, r, c) {
    const div = document.getElementById('abilities'); div.innerHTML = '';
    if(p.cd > 0) return div.innerText = "CD: " + p.cd;

    const btn = document.createElement('button'); btn.className = 'btn';
    if(p.type==='Pawn') {
        btn.innerText = "STUN"; btn.onclick = () => { 
            [c-1, c+1].forEach(nc => { if(board[r][nc] && board[r][nc].team !== p.team) board[r][nc].st = 2; });
            p.cd = 2; endTurn();
        };
    } else if(p.type==='Knight') {
        btn.innerText = "TRAP"; btn.onclick = () => { traps.push({r, c, team:myTeam}); p.cd = 3; endTurn(); };
    } else if(p.type==='Bishop') {
        btn.innerText = "SHIELD"; btn.onclick = () => {
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr,dc])=>{ 
                let a = board[r+dr]?.[c+dc]; if(a && a.team===myTeam) a.sh = true; 
            });
            p.cd = 3; endTurn();
        };
    } else return;
    div.appendChild(btn);
}
</script>
</body>
</html>
